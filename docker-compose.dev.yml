services:
  nextjs:
    build:
      context: .
      target: deps
    working_dir: /app
    command: sh -c "mkdir -p data/images && npx prisma migrate deploy && npm run dev -- --hostname 0.0.0.0 --port 3000"
    # ports:
    #   - "3000:3000"
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules